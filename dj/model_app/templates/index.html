<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
</head>
<body>
    <h2>Главная</h2>
    <p> Привет, {{ user.username|default:"Гость" }}! </p>

        <a href="/register">Регистрация</a>
    {% endif %}

</body>
</html>
